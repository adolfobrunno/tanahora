name: Deploy AWS ECS

on:
  push:
    branches:
      - aws
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load AWS .env from secret
        shell: bash
        run: |
          cat <<'EOF' > .env
          ${{ secrets.AWS_DOTENV }}
          EOF

          set -a
          source .env
          set +a

          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION
            ECR_REPOSITORY
            ECS_CLUSTER
            ECS_SERVICE
            ECS_CONTAINER_NAME
            ECS_TASK_FAMILY
            ECS_TASK_EXECUTION_ROLE_ARN
            ECS_TASK_ROLE_ARN
            ECS_LOG_GROUP
            ECS_LOG_STREAM_PREFIX
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required key in AWS_DOTENV: $key"
              exit 1
            fi
          done

          {
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
            echo "AWS_REGION=$AWS_REGION"
            echo "ECR_REPOSITORY=$ECR_REPOSITORY"
            echo "ECS_CLUSTER=$ECS_CLUSTER"
            echo "ECS_SERVICE=$ECS_SERVICE"
            echo "ECS_CONTAINER_NAME=$ECS_CONTAINER_NAME"
            echo "ECS_TASK_FAMILY=$ECS_TASK_FAMILY"
            echo "ECS_TASK_EXECUTION_ROLE_ARN=$ECS_TASK_EXECUTION_ROLE_ARN"
            echo "ECS_TASK_ROLE_ARN=$ECS_TASK_ROLE_ARN"
            echo "ECS_LOG_GROUP=$ECS_LOG_GROUP"
            echo "ECS_LOG_STREAM_PREFIX=$ECS_LOG_STREAM_PREFIX"
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null

      - name: Ensure CloudWatch log group exists
        shell: bash
        run: |
          aws logs describe-log-groups \
            --log-group-name-prefix "${ECS_LOG_GROUP}" \
            --query "logGroups[?logGroupName=='${ECS_LOG_GROUP}'].logGroupName" \
            --output text | grep -q "${ECS_LOG_GROUP}" || \
          aws logs create-log-group --log-group-name "${ECS_LOG_GROUP}"

      - name: Build and push Docker image
        id: build-image
        shell: bash
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}"

          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" -t "${IMAGE_URI}:latest" .
          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image=${IMAGE_URI}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install envsubst
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Render ECS task definition from template
        shell: bash
        run: |
          envsubst < deploy/ecs-task-definition.json.tpl > deploy/ecs-task-definition.json

      - name: Fill image in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs-task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-max-delay-seconds: 15

      - name: ECS diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          echo "=== ECS service summary ==="
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount,taskDefinition:taskDefinition}' \
            --output table || true

          echo "=== Recent ECS service events ==="
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].events[0:15].[createdAt,message]' \
            --output table || true

          echo "=== Recently stopped tasks ==="
          STOPPED_TASKS=$(aws ecs list-tasks \
            --cluster "${ECS_CLUSTER}" \
            --service-name "${ECS_SERVICE}" \
            --desired-status STOPPED \
            --max-items 10 \
            --query 'taskArns' \
            --output text)

          if [ -n "${STOPPED_TASKS}" ] && [ "${STOPPED_TASKS}" != "None" ]; then
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER}" \
              --tasks ${STOPPED_TASKS} \
              --query 'tasks[].{task:taskArn,lastStatus:lastStatus,healthStatus:healthStatus,stoppedReason:stoppedReason,containers:containers[].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason}}' \
              --output json || true
          else
            echo "No stopped tasks found."
          fi

          echo "=== Recent CloudWatch logs from ECS service ==="
          RECENT_STREAMS=$(aws logs describe-log-streams \
            --log-group-name "${ECS_LOG_GROUP}" \
            --order-by LastEventTime \
            --descending \
            --max-items 3 \
            --query 'logStreams[].logStreamName' \
            --output text)

          if [ -n "${RECENT_STREAMS}" ] && [ "${RECENT_STREAMS}" != "None" ]; then
            for stream in ${RECENT_STREAMS}; do
              echo "--- Stream: ${stream} ---"
              aws logs get-log-events \
                --log-group-name "${ECS_LOG_GROUP}" \
                --log-stream-name "${stream}" \
                --limit 50 \
                --query 'events[].message' \
                --output text || true
            done
          else
            echo "No log streams found in ${ECS_LOG_GROUP}."
          fi
